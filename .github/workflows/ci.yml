- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    pip install pytest

- name: Generate logs
  run: |
    mkdir -p logs
    python -c "from simulators.system_simulator import generate_logs_fast; open('logs/system.log','w').write(generate_logs_fast())"

- name: Run tests
  run: |
    pytest tests/ -v